schema: spec-driven

context: |
  Язык проекта OpenSpec: русский.
  Все артефакты OpenSpec, включая предложения, спецификации, дизайн и задачи,
  должны быть написаны на русском языке. Английские технические термины,
  имена файлов, URL, команды и идентификаторы сохраняйте без перевода,
  когда это необходимо для точности.

  Проект: статический сайт Telegram-бота Таро, опубликованный через GitHub Pages.
  Основные технологии: HTML, CSS и минимальный JavaScript без сборщика и бэкенда.
  Перед подготовкой или применением изменений обязательно учитывайте AGENTS.md.
  Источник продуктовых фактов: taro-bot-website-master-description.md.
  Не придумывайте функции, цены, отзывы, рейтинги, результаты или юридические
  утверждения. Сохраняйте CNAME и совместимость с GitHub Pages.

rules:
  proposal:
    - Ясно указывайте цель, пользовательскую ценность, границы изменения и то, что не входит в работу.
    - Перечисляйте затрагиваемые страницы, публичные URL и риски для SEO, доступности и GitHub Pages.
  specs:
    - Формулируйте требования проверяемо, а сценарии — в формате GIVEN/WHEN/THEN с русскими пояснениями.
    - Для пользовательских страниц учитывайте мобильные экраны от 320 px и работу без JavaScript.
  design:
    - Объясняйте ключевые решения, альтернативы, риски и способ отката.
    - Не вводите фреймворк, сборщик, бэкенд, аналитику или новые конверсионные пути без прямого запроса.
  tasks:
    - Делите работу на небольшие проверяемые шаги и добавляйте проверки после реализации.
    - Отдельно отмечайте локальные проверки и проверки, возможные только после публикации.
