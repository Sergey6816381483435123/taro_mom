<?xml version="1.0" encoding="utf-8"?>
<!-- Favicon for Taroshenka: stylized tarot card with crescent moon and star -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Taroshenka">
  <rect x="6" y="4" width="52" height="56" rx="6" fill="#0d0f17" />
  <rect x="6" y="4" width="52" height="56" rx="6" fill="none" stroke="#caa2ff" stroke-opacity="0.95" stroke-width="2" />

  <!-- crescent moon -->
  <circle cx="32" cy="24" r="9" fill="#caa2ff" />
  <circle cx="36" cy="22" r="7" fill="#0d0f17" />

  <!-- small star / sparkle -->
